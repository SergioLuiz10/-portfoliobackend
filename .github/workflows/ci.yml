name: CI # nome no GitHub Actions
on: # faz comçar 
  push: # dispara toda vez q commitar  
  pull_request: # dispara toda vez q abrir um pull request

jobs: # título da seção onde vão as tarefas
  qualidade: # nome do job
    runs-on: ubuntu-latest # q tiupo de maquina o job vai rodar
    steps: #lista de passos pro job
     - name: Baixar o código # nome do passo
       uses: actions/checkout@v4 #1 passo acao q baixa o código do repositório
     - name : Configura Python # nome do passo
       uses: actions/setup-python@v5 #2 passo acao q configura o python   
       with: # baixar python com essas configs 
         python-version: "3.11" # versão do python
     - name: Instalar Ferramentas # nome do passo
       run: | #3 passo rodar comandos para instalar as ferramentas # ruff do lint  problemas de qualidade e estilo)) e # instala o bandit( vulnerabilidades de segurança no código)
         pip install ruff  
         pip install bandit 
     - name : Rodar lint (qualidade/estilo) 
       run: ruff check . #4 passo rodar o ruff para verificar a qualidade do código(. significa verificar a pasta atual e subpastas)
     - name: Rodar bandit (segurança)
       run: bandit -r app/ #5 passo rodar o bandit para verificar vulnerabilidades de segurança(-r entra em subpastaas e app onde tem o codigo)
     - name: Instalar dependencias do projeto
       # 6 passo rodar comando para instalar as dependências do projeto, usando o arquivo requirements.txt que lista as dependências necessárias para o projeto
       run: pip install -r requirements.txt 
     - name: Rodar testes (pytest)
       # 7 passo rodar os testes automatizados usando o pytest, com a opção -v para saída detalhada dos resultados dos testes
       env:
         openai_api_key: "sk-fake-pra-ci"
         database_url: "postgresql+psycopg://fake:fake@localhost:5432/fake"
         embedding_model: "text-embedding-3-small"
         llm_model: "gpt-4o-mini"
         admin_token: "token_de_teste"
       run: pytest -v
 