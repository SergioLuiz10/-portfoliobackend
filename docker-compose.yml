services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: asksergio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sergio
      POSTGRES_PASSWORD: sergio123
      POSTGRES_DB: asksergio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: